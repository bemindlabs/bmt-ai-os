# BMT AI OS — Jetson Orin Nano Super (CUDA) override
# Generated/copied by passthrough.sh — do not edit manually.
#
# Enables NVIDIA Container Runtime for GPU-accelerated inference via Ollama.
# Requires: nvidia-container-toolkit installed on host, NVIDIA runtime in daemon.json.
#
# BMTOS-2b | Epic: BMTOS-EPIC-4

services:
  ollama:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=all
      - BMT_ACCEL=cuda
      - BMT_NPU_BACKEND=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
