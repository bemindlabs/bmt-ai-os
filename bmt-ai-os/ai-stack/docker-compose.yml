# BMT AI OS — Production AI Stack (ARM64)
# Runs on-device as system services managed by the controller.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: bmt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - bmt-ai-net
    dns:
      - 127.0.0.11
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    container_name: bmt-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - bmt-ai-net
    dns:
      - 127.0.0.11
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama_models:
  chromadb_data:

networks:
  bmt-ai-net:
    name: bmt-ai-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
    labels:
      ai.bemind.component: networking
      ai.bemind.story: BMTOS-20
