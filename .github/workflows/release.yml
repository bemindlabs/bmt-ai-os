# .github/workflows/release.yml — Build & push Docker image on release
#
# Triggers on version tags (v*) and published releases.
# Pushes to Docker Hub as bemindlab/bmt-ai-os:<version> and :latest
#
# Required secrets:
#   DOCKER_USERNAME — Docker Hub username
#   DOCKER_PASSWORD — Docker Hub access token

name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            bemindlab/bmt-ai-os:${{ steps.version.outputs.tag }}
            bemindlab/bmt-ai-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=BMT AI OS
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.source=https://github.com/bemindlabs/bmt-ai-os

      - name: Verify image
        run: docker pull bemindlab/bmt-ai-os:${{ steps.version.outputs.tag }} && docker run --rm bemindlab/bmt-ai-os:${{ steps.version.outputs.tag }} python3 -c "from bmt_ai_os.controller.api import app; print('OK')"
