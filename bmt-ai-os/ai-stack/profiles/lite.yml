# BMT AI OS — Lite Device Tier
# Target: Raspberry Pi 5, RK3588 boards with 8GB RAM
#
# Usage:
#   cp profiles/lite.yml .env.local
#   # or source values into .env

# Device tier
BMT_DEVICE_TIER=lite

# Ollama: constrained for 8GB devices
OLLAMA_CPU_LIMIT=2.0
OLLAMA_MEM_LIMIT=4g
OLLAMA_NUM_PARALLEL=1
OLLAMA_MAX_LOADED_MODELS=1
OLLAMA_KEEP_ALIVE=2m
OLLAMA_DEFAULT_MODEL=qwen2.5-coder:3b-instruct-q4_K_M

# ChromaDB: minimal footprint
CHROMADB_CPU_LIMIT=1.0
CHROMADB_MEM_LIMIT=512m
