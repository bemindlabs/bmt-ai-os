# .pre-commit-config.yaml — BMT AI OS quality gates
# Install: pip install pre-commit && pre-commit install --hook-type pre-commit --hook-type pre-push

repos:
  # ── Ruff (lint + format) ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      # pre-commit: lint check
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      # pre-commit: format check
      - id: ruff-format
        stages: [pre-commit]

  # ── Docker Compose validation ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: docker-compose-validate
        name: Validate Docker Compose
        entry: docker compose -f bmt_ai_os/ai-stack/docker-compose.yml config --quiet
        language: system
        pass_filenames: false
        files: docker-compose\.yml$
        stages: [pre-commit]

  # ── YAML / JSON validation ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # ── ShellCheck ────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        stages: [pre-commit]

  # ── Pre-push: smoke tests ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: smoke-tests
        name: Smoke Tests
        entry: python3 -m pytest tests/smoke/ -x -q --tb=short -m smoke
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: unit-tests
        name: Unit Tests
        entry: python3 -m pytest tests/unit/ -x -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
