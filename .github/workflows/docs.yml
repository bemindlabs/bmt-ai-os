# .github/workflows/docs.yml — BMT AI OS Documentation Deploy
# BMTOS-51: MkDocs Material documentation site
#
# Triggers:
#   - Push to main branch
#   - Version tags (v* or YYYY.M.D format)
#
# Jobs:
#   1. build  — Validate mkdocs build
#   2. deploy — Deploy to GitHub Pages (main + tags only)

name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9][0-9][0-9][0-9].*"
  pull_request:
    branches:
      - main

# Allow one concurrent deployment; cancel in-progress runs on PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build — validate the MkDocs site can be built cleanly
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install documentation dependencies
        run: |
          pip install \
            "mkdocs-material>=9.5" \
            "mkdocstrings[python]>=0.24"

      - name: Build MkDocs site
        run: mkdocs build --verbose

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy — publish to GitHub Pages (main branch and version tags)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main branch pushes or version tag pushes — not PRs
    # Requires GitHub Pages enabled: Settings → Pages → Source: GitHub Actions
    continue-on-error: true
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install documentation dependencies
        run: |
          pip install \
            "mkdocs-material>=9.5" \
            "mkdocstrings[python]>=0.24"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
