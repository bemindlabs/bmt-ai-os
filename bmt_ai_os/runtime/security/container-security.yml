# BMT AI OS — Container Security Overlay (ARM64)
#
# BMTOS-50 | Epic: BMTOS-EPIC-3 (OS Foundation & Infrastructure)
#
# Docker Compose override that hardens AI-stack containers with per-service
# AppArmor profiles, seccomp syscall filters, non-root users, read-only
# rootfs where feasible, capability drops, PID limits, and tmpfs mounts.
#
# Apply with:
#   docker compose \
#     -f bmt_ai_os/ai-stack/docker-compose.yml \
#     -f bmt_ai_os/runtime/security/container-security.yml \
#     up -d
#
# Prerequisites (Linux host only):
#   1. Load AppArmor profiles:
#        sudo cp bmt_ai_os/runtime/security/apparmor-*.profile /etc/apparmor.d/
#        sudo apparmor_parser -r /etc/apparmor.d/bmt-ollama
#        sudo apparmor_parser -r /etc/apparmor.d/bmt-chromadb
#        sudo apparmor_parser -r /etc/apparmor.d/bmt-controller
#   2. Ensure secrets directories exist (see secrets-manager.sh init):
#        sudo secrets-manager.sh init
#
# Security model:
#   - Drop ALL Linux capabilities, re-add only the minimum required per service
#   - no-new-privileges: prevent setuid/setgid privilege escalation
#   - Per-service seccomp: syscall allowlist tuned to each workload (ARM64)
#   - Per-service AppArmor: filesystem and capability MAC enforcement
#   - Non-root UIDs: containers run as unprivileged user 1000
#   - Read-only rootfs: ChromaDB and Controller (Ollama needs rw model cache)
#   - PID limits: prevent fork bombs
#   - tmpfs /tmp: ephemeral temp space, noexec, nosuid
#   - Secrets via bind-mount at /run/secrets (never env vars)

services:
  ollama:
    # Ollama needs rw rootfs for model cache under /root/.ollama.
    # mmap + mlock of multi-GB GGUF files requires SYS_RESOURCE.
    # BMTOS-50: io_uring + mmap seccomp allowlist; bmt-ollama AppArmor profile.
    user: "1000:1000"
    read_only: false
    security_opt:
      - no-new-privileges:true
      - seccomp=bmt_ai_os/runtime/security/seccomp-ollama.json
      - apparmor=bmt-ollama
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_RESOURCE
    pids_limit: 256
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    volumes:
      - /etc/bmt_ai_os/secrets/ollama:/run/secrets:ro
    environment:
      # Ensure no sensitive keys leak via env; loaded from /run/secrets instead
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
    labels:
      com.bemind.security: "hardened"
      com.bemind.security.caps: "NET_BIND_SERVICE,SYS_RESOURCE"
      com.bemind.security.seccomp: "seccomp-ollama.json"
      com.bemind.security.apparmor: "bmt-ollama"

  chromadb:
    # ChromaDB: read-only rootfs + tmpfs writable /tmp.
    # Data volume /chroma/chroma is rw (vector indices + SQLite WAL).
    # BMTOS-50: mmap/HNSW seccomp allowlist; bmt-chromadb AppArmor profile.
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=bmt_ai_os/runtime/security/seccomp-chromadb.json
      - apparmor=bmt-chromadb
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    volumes:
      - /etc/bmt_ai_os/secrets/chromadb:/run/secrets:ro
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    labels:
      com.bemind.security: "hardened"
      com.bemind.security.caps: "NET_BIND_SERVICE"
      com.bemind.security.seccomp: "seccomp-chromadb.json"
      com.bemind.security.apparmor: "bmt-chromadb"

  controller:
    # Controller: read-only rootfs + tmpfs /tmp.
    # Requires rw Docker socket bind-mount (docker-py container management).
    # BMTOS-50: minimal syscall set; bmt-controller AppArmor profile.
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=bmt_ai_os/runtime/security/seccomp-controller.json
      - apparmor=bmt-controller
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/log/bmt:rw,noexec,nosuid,size=32m
    volumes:
      - /etc/bmt_ai_os/secrets/controller:/run/secrets:ro
    labels:
      com.bemind.security: "hardened"
      com.bemind.security.caps: "NET_BIND_SERVICE"
      com.bemind.security.seccomp: "seccomp-controller.json"
      com.bemind.security.apparmor: "bmt-controller"
