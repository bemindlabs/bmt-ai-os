[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bmt-ai-os"
version = "0.1.0"
description = "BMT AI OS — AI-first operating system for ARM64"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "docker",
    "pyyaml",
    "fastapi",
    "uvicorn",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[tool.hatch.build.targets.wheel]
packages = ["bmt-ai-os"]

# Map the on-disk directory name (bmt-ai-os) to a valid Python package name.
[tool.hatch.build.targets.wheel.force-include]
"bmt-ai-os" = "bmt_ai_os"

[tool.pytest.ini_options]
asyncio_mode = "auto"
