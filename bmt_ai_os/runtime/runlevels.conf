# BMT AI OS — OpenRC Runlevel Configuration
#
# Documents which services belong to which OpenRC runlevels.
# Use this file as the source of truth when provisioning a new image
# (the build system reads this to create the rc-update symlinks).
#
# BMTOS-17 | Epic: BMTOS-EPIC-3 (OS Foundation & Infrastructure)
#
# Syntax:  <runlevel> <service>
# Lines starting with # are comments.

# =========================================================================
# sysinit — hardware and early kernel setup (runs before any other level)
# =========================================================================
sysinit devfs
sysinit dmesg
sysinit mdev
sysinit hwdrivers
sysinit cgroups

# =========================================================================
# boot — core OS services needed before the default runlevel
# =========================================================================
boot modules
boot hwclock
boot hostname
boot sysctl
boot bootmisc
boot syslog

# =========================================================================
# default — main runlevel, brings up the full AI OS stack
#
# Boot order within this runlevel is governed by depend() blocks in each
# init script, not by the order listed here:
#
#   networking
#     └─ containerd
#          └─ docker
#               ├─ bmt-recovery   (after localmount, before ai-stack)
#               ├─ bmt-firstboot  (after docker+recovery, before ai-stack)
#               └─ ai-stack       (after docker+recovery+firstboot)
#                    └─ bmt-controller (after ai-stack)
#
# The clean-shutdown handler also runs in default but its stop() fires
# during shutdown before docker/containerd stop.
# =========================================================================
default networking
default containerd
default docker
default bmt-recovery
default bmt-firstboot
default ai-stack
default bmt-controller
default bmt-clean-shutdown

# =========================================================================
# shutdown — services that run only during system halt/reboot
# =========================================================================
shutdown savecache
shutdown killprocs
shutdown mount-ro
