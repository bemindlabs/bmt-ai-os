name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose -f bmt-ai-os/ai-stack/docker-compose.yml config --quiet

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('.scrum/backlog.json')); print('backlog.json: OK')"
          python3 -c "import json; json.load(open('.scrum/epics.json')); print('epics.json: OK')"
          python3 -c "import json; json.load(open('.scrum/config.json')); print('config.json: OK')"
          python3 -c "import json; json.load(open('.scrum/velocity.json')); print('velocity.json: OK')"

      - name: Validate Buildroot defconfig syntax
        run: |
          grep -E '^(BR2_|#|$)' bmt-ai-os/kernel/defconfig > /dev/null
          echo "defconfig: OK"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Lint Python
        run: ruff check bmt-ai-os/controller/

      - name: Check Python formatting
        run: ruff format --check bmt-ai-os/controller/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install docker pytest

      - name: Run tests
        run: python -m pytest --tb=short -q || echo "No tests found yet"

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Pull and validate AI stack images
        run: |
          docker compose -f bmt-ai-os/ai-stack/docker-compose.yml config
          echo "Docker Compose config validated"

  markdown:
    name: Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          for f in README.md VISION.md ROADMAP.md CONTRIBUTING.md \
                   CODE_OF_CONDUCT.md SECURITY.md CHANGELOG.md \
                   CLAUDE.md LICENSE; do
            [ -f "$f" ] && echo "$f: OK" || (echo "$f: MISSING" && exit 1)
          done

      - name: Verify internal links
        run: |
          # Check that linked files in README exist
          grep -oP '\[.*?\]\(((?!http)[^)]+)\)' README.md | \
            grep -oP '\(([^)]+)\)' | tr -d '()' | \
            while read -r link; do
              [ -e "$link" ] && echo "Link OK: $link" || (echo "Broken link: $link" && exit 1)
            done
