# yaml-language-server: $schema=https://json.schemastore.org/docker-compose
# BMT AI OS — Standard Device Tier
# Target: Jetson Orin Nano Super, RK3588 boards with 16GB RAM
#
# Usage:
#   cp profiles/standard.yml .env.local
#   # or source values into .env

# Device tier
BMT_DEVICE_TIER=standard

# Ollama: balanced for 16GB devices
OLLAMA_CPU_LIMIT=4.0
OLLAMA_MEM_LIMIT=8g
OLLAMA_NUM_PARALLEL=2
OLLAMA_MAX_LOADED_MODELS=1
OLLAMA_KEEP_ALIVE=5m
OLLAMA_DEFAULT_MODEL=qwen2.5-coder:7b-instruct-q4_K_M

# ChromaDB: standard footprint
CHROMADB_CPU_LIMIT=2.0
CHROMADB_MEM_LIMIT=1g
