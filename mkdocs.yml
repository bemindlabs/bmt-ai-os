site_name: BMT AI OS
site_description: An open-source, AI-first operating system for ARM64
site_url: https://bemindlabs.github.io/bmt-ai-os
repo_url: https://github.com/bemindlabs/bmt-ai-os
repo_name: bemindlabs/bmt-ai-os
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 Bemind Technology Co., Ltd. &mdash; MIT License"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

exclude_docs: |
  README.md
  ide-integration/README.md

plugins:
  - search:
      lang: en
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bemindlabs/bmt-ai-os
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quick Start: getting-started/quick-start.md
    - Installation: getting-started/installation.md
    - Dev Setup (x86 Docker): getting-started/dev-setup.md
  - Architecture:
    - architecture/index.md
    - System Overview: architecture/system-overview.md
    - Provider Layer: architecture/provider-layer.md
    - Boot Sequence: architecture/boot-sequence.md
    - Filesystem Layout: architecture/filesystem-layout.md
  - Hardware:
    - hardware/index.md
    - Supported Boards: hardware/supported-boards.md
    - Apple Silicon: hardware/apple-silicon.md
    - Jetson Orin Nano Super: hardware/jetson-orin.md
    - RK3588 (Orange Pi 5, ROCK 5B): hardware/rk3588.md
    - Raspberry Pi 5 + Hailo: hardware/pi5-hailo.md
  - API Reference:
    - api/index.md
    - REST API Overview: api/overview.md
    - OpenAI-Compatible API: api/openai-compat.md
    - RAG API: api/rag.md
    - Health & Status: api/health.md
    - Python Modules:
      - Controller: api/python/controller.md
      - Providers: api/python/providers.md
      - RAG Pipeline: api/python/rag.md
  - Configuration:
    - reference/configuration.md
  - IDE Integration:
    - ide-integration/index.md
    - Cursor Setup: ide-integration/cursor-setup.md
    - Copilot Setup: ide-integration/copilot-setup.md
  - Reference:
    - reference/index.md
    - Port Map: reference/port-map.md
    - CLI Reference: reference/cli-reference.md
    - Troubleshooting: reference/troubleshooting.md
    - FAQ: reference/faq.md
  - Operations:
    - Deployment Runbook: operations/deployment-runbook.md
    - Monitoring Guide: operations/monitoring-guide.md
    - Backup and Restore: operations/backup-restore.md
    - Troubleshooting: operations/troubleshooting.md
  - Security:
    - Security Policy: security/security-policy.md
